[[tool]]
name = "just_runner"
command = ["bash", "-lc", "codex/all-skills/tools/just_tool.py"]
description = "List, show, and run Justfile recipes using the pinned just binary."

[[tool]]
name = "wasmtime_exec"
command = ["bash", "-lc", "codex/all-skills/tools/wasmtime_tool.py"]
description = "Run, inspect, or compile WebAssembly components via wasmtime."

[[tool]]
name = "awesome_wasm_helper"
command = ["bash", "-lc", "codex/all-skills/tools/awesome_wasm_tool.py"]
description = "Download components with wkg, inspect WIT, and update components.json."

[[tool]]
name = "wasm_build_helper"
command = ["bash", "-lc", "codex/all-skills/tools/wasm_build_tool.py"]
description = "Run canonical build commands for Rust/Python/JS/Go components (or custom command lists)."

[[tool]]
name = "wasm_oci_helper"
command = ["bash", "-lc", "codex/all-skills/tools/wasm_oci_tool.py"]
description = "Invoke wkg/run-wkg.sh to pull or push WebAssembly components to OCI registries."
